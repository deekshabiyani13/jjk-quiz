<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JJK Soul Resonance — Which Sorcerer Are You?</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-blue: #00d4ff;
    --neon-purple: #9b59ff;
    --neon-pink: #ff2d9b;
    --neon-gold: #ffd700;
    --neon-red: #ff3333;
    --dark-bg: #04030a;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --text-primary: #f0eaff;
    --text-secondary: rgba(240,234,255,0.6);
    --glow-blue: 0 0 20px rgba(0,212,255,0.4), 0 0 60px rgba(0,212,255,0.15);
    --glow-purple: 0 0 20px rgba(155,89,255,0.4), 0 0 60px rgba(155,89,255,0.15);
    --glow-pink: 0 0 20px rgba(255,45,155,0.4), 0 0 60px rgba(255,45,155,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark-bg);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── CANVAS BACKGROUND ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── CUSTOM CURSOR ── */
  .cursor-dot {
    width: 8px; height: 8px;
    background: var(--neon-blue);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    transition: background 0.2s;
    box-shadow: 0 0 10px var(--neon-blue);
  }
  .cursor-ring {
    width: 32px; height: 32px;
    border: 1.5px solid rgba(0,212,255,0.5);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%,-50%);
    transition: transform 0.12s ease, width 0.2s, height 0.2s, border-color 0.2s;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
    padding: 20px;
    overflow-y: auto;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── LANDING ── */
  #landing {
    flex-direction: column;
    text-align: center;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(155,89,255,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 70%, rgba(0,212,255,0.08) 0%, transparent 60%),
                var(--dark-bg);
  }

  .landing-inner {
    max-width: 700px;
    width: 100%;
  }

  .kanji-decoration {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(60px, 12vw, 120px);
    font-weight: 700;
    background: linear-gradient(135deg, rgba(155,89,255,0.3), rgba(0,212,255,0.3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
    animation: float 6s ease-in-out infinite;
    letter-spacing: -4px;
  }

  .subtitle-tag {
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--neon-blue);
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .main-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 5vw, 54px);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 40%, var(--neon-purple) 80%, var(--neon-pink) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 30px rgba(155,89,255,0.4));
  }

  .tagline {
    font-size: clamp(14px, 2.5vw, 18px);
    color: var(--text-secondary);
    margin-bottom: 40px;
    font-weight: 300;
    line-height: 1.6;
  }

  .name-input-wrapper {
    position: relative;
    margin-bottom: 30px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }

  .name-input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    backdrop-filter: blur(10px);
    text-align: center;
  }
  .name-input::placeholder { color: rgba(240,234,255,0.3); }
  .name-input:focus {
    border-color: rgba(155,89,255,0.5);
    box-shadow: var(--glow-purple);
  }

  .start-btn {
    position: relative;
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    border: none;
    border-radius: 50px;
    padding: 18px 56px;
    color: #fff;
    font-family: 'Cinzel Decorative', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 4px 30px rgba(155,89,255,0.4);
  }
  .start-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 50px rgba(155,89,255,0.6), 0 0 80px rgba(0,212,255,0.2);
  }
  .start-btn:active { transform: scale(0.97); }
  .start-btn::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple), var(--neon-blue));
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s;
    animation: borderRotate 3s linear infinite;
  }

  .char-previews {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 44px;
    flex-wrap: wrap;
  }
  .char-pip {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    overflow: hidden;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.05);
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    cursor: default;
    position: relative;
  }
  .char-pip:hover {
    transform: translateY(-6px) scale(1.15);
    border-color: var(--neon-purple);
    box-shadow: var(--glow-purple);
    z-index: 2;
  }
  .char-pip-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--neon-blue);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .char-pip:hover .char-pip-label { opacity: 1; }

  /* ── QUIZ SCREEN ── */
  #quiz {
    flex-direction: column;
    align-items: center;
    background: var(--dark-bg);
    padding: 20px 20px 40px;
  }

  .quiz-container {
    max-width: 780px;
    width: 100%;
    position: relative;
  }

  /* progress */
  .progress-bar-wrap {
    margin-bottom: 24px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--neon-purple);
  }
  .progress-fraction {
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    color: var(--neon-blue);
  }
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue), var(--neon-pink));
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--neon-blue);
    box-shadow: 0 0 12px var(--neon-blue);
  }

  /* question card */
  .question-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 40px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    animation: cardEnter 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-blue), transparent);
    opacity: 0.6;
  }

  .question-category {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--neon-pink);
    margin-bottom: 14px;
    font-weight: 600;
  }

  .question-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(16px, 2.8vw, 22px);
    font-weight: 400;
    line-height: 1.6;
    color: var(--text-primary);
    margin-bottom: 32px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .options-grid.single-col { grid-template-columns: 1fr; }

  .option-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px 22px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }
  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 16px;
  }
  .option-btn span { position: relative; z-index: 1; }
  .option-btn .opt-letter {
    display: inline-block;
    width: 26px; height: 26px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    text-align: center;
    line-height: 24px;
    font-size: 12px;
    font-weight: 700;
    margin-right: 12px;
    transition: background 0.25s, border-color 0.25s;
    color: var(--neon-blue);
    flex-shrink: 0;
  }
  .option-btn .opt-body { display: flex; align-items: center; }

  .option-btn:hover {
    border-color: rgba(155,89,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(155,89,255,0.2);
  }
  .option-btn:hover::before { opacity: 0.08; }
  .option-btn:hover .opt-letter {
    background: var(--neon-purple);
    border-color: var(--neon-purple);
    color: #fff;
  }

  .option-btn.selected {
    border-color: var(--neon-blue);
    box-shadow: var(--glow-blue);
    transform: translateY(-2px);
    animation: selectedPulse 0.4s ease;
  }
  .option-btn.selected::before { opacity: 0.15; }

  /* ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(0,212,255,0.35);
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    pointer-events: none;
  }

  /* ── TRANSITION SCREEN ── */
  #transition-screen {
    background: var(--dark-bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 20;
  }
  .transition-orb {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--neon-blue), var(--neon-purple));
    box-shadow: 0 0 60px var(--neon-blue), 0 0 120px rgba(155,89,255,0.5);
    animation: orbPulse 1s ease-in-out infinite alternate;
    margin-bottom: 30px;
  }
  .transition-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--neon-blue);
    animation: flicker 0.5s ease-in-out infinite alternate;
  }

  /* ── RESULT SCREEN ── */
  #result {
    flex-direction: column;
    align-items: center;
    text-align: center;
    background: var(--dark-bg);
    overflow-y: auto;
    padding: 40px 20px 80px;
    z-index: 15;
  }

  .result-inner {
    max-width: 700px;
    width: 100%;
    animation: resultReveal 1s cubic-bezier(0.4,0,0.2,1) forwards;
    opacity: 0;
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--neon-pink);
    margin-bottom: 10px;
  }

  .result-subtitle {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 40px;
  }

  .result-avatar {
    width: 160px; height: 160px;
    border-radius: 50%;
    margin: 0 auto 28px;
    font-size: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: avatarFloat 4s ease-in-out infinite;
  }
  .result-avatar::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: conic-gradient(var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-blue));
    z-index: -1;
    animation: borderRotate 3s linear infinite;
  }
  .result-avatar::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: var(--dark-bg);
    z-index: -1;
  }
  .avatar-inner {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 75px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .result-character-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    margin-bottom: 6px;
    line-height: 1;
  }

  .result-title {
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0.8;
  }

  .result-desc-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 32px;
    backdrop-filter: blur(20px);
    margin-bottom: 28px;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .result-desc-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, currentColor, transparent);
    opacity: 0.4;
  }

  .result-desc {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text-primary);
    font-weight: 400;
  }

  .result-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
  }
  .trait-tag {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .love-message {
    background: linear-gradient(135deg, rgba(255,45,155,0.1), rgba(155,89,255,0.1));
    border: 1px solid rgba(255,45,155,0.25);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .love-message::before {
    content: '💌';
    font-size: 40px;
    display: block;
    margin-bottom: 14px;
  }
  .love-message-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--neon-pink);
    margin-bottom: 10px;
  }
  .love-message-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-primary);
  }

  .final-line {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(13px, 2.5vw, 16px);
    color: var(--neon-pink);
    margin-bottom: 40px;
    line-height: 1.8;
    opacity: 0.9;
  }

  .secret-btn {
    background: transparent;
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 50px;
    padding: 12px 30px;
    color: var(--neon-gold);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 16px;
  }
  .secret-btn:hover {
    background: rgba(255,215,0,0.1);
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
    transform: scale(1.05);
  }

  .retry-btn {
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
    border: none;
    border-radius: 50px;
    padding: 16px 44px;
    color: #fff;
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 30px rgba(255,45,155,0.3);
    margin-left: 12px;
  }
  .retry-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(255,45,155,0.5);
  }

  /* Secret overlay */
  #secret-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,3,10,0.97);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    padding: 20px;
  }
  #secret-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .secret-card {
    max-width: 500px;
    text-align: center;
    background: var(--card-bg);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 24px;
    padding: 48px 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 80px rgba(255,215,0,0.1);
    animation: secretReveal 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
    transform: scale(0.8);
  }
  #secret-overlay.show .secret-card { animation: secretReveal 0.6s cubic-bezier(0.4,0,0.2,1) forwards; }
  .secret-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--neon-gold);
    margin-bottom: 20px;
    text-shadow: 0 0 20px var(--neon-gold);
  }
  .secret-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    line-height: 2;
    color: var(--text-primary);
    margin-bottom: 28px;
  }
  .close-secret {
    background: transparent;
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 50px;
    padding: 10px 28px;
    color: var(--neon-gold);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .close-secret:hover { background: rgba(255,215,0,0.1); }

  /* music toggle */
  .music-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 48px; height: 48px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 50;
    font-size: 18px;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .music-toggle:hover {
    border-color: var(--neon-purple);
    box-shadow: var(--glow-purple);
    transform: scale(1.1);
  }

  /* click-sound indicator */
  .click-flash {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,212,255,0.03);
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .click-flash.flash { opacity: 1; }

  /* ── ANIMATIONS ── */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: none; }
  }
  @keyframes selectedPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: translateY(-2px); }
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }
  @keyframes borderRotate {

//  CANVAS PARTICLE BACKGROUND
// ─────────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 1.5 + 0.3;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.speedY = (Math.random() - 0.5) * 0.4;
    this.life = 1;
    this.decay = Math.random() * 0.003 + 0.001;
    const palette = ['rgba(0,212,255,', 'rgba(155,89,255,', 'rgba(255,45,155,'];
    this.color = palette[Math.floor(Math.random() * palette.length)];
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color + (this.life * 0.7) + ')';
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });

  // connection lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(155,89,255,${0.05 * (1 - dist / 100)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playClick() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.frequency.setValueAtTime(800, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, ac.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    osc.start(); osc.stop(ac.currentTime + 0.15);
  } catch(e) {}
}

function playReveal() {
  try {
    const ac = getAudio();
    [0, 200, 400, 600].forEach((delay, i) => {
      setTimeout(() => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        const freqs = [440, 550, 660, 880];
        osc.frequency.value = freqs[i];
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.6);
        osc.start(); osc.stop(ac.currentTime + 0.6);
      }, delay);
    });
  } catch(e) {}
}

let ambientInterval = null;
document.getElementById('musicToggle').addEventListener('click', () => {
  musicOn = !musicOn;
  document.getElementById('musicToggle').textContent = musicOn ? '🔇' : '🎵';
  if (musicOn) {
    ambientInterval = setInterval(() => {
      try {
        const ac = getAudio();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        const notes = [220, 246, 261, 293, 329, 349, 392, 440];
        osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ac.currentTime);
        gain.gain.linearRampToValueAtTime(0.04, ac.currentTime + 0.5);
        gain.gain.linearRampToValueAtTime(0, ac.currentTime + 2.5);
        osc.start(); osc.stop(ac.currentTime + 3);
      } catch(e) {}
    }, 2000);
  } else {
    clearInterval(ambientInterval);
  }
});

function renderQuestion(animDir = 'enter') {
  const card = document.getElementById('questionCard');
  card.style.opacity = '0';
  card.style.transform = 'translateY(20px)';

  setTimeout(() => {
    const q = QUESTIONS[currentQ];
    const letters = ['A', 'B', 'C', 'D'];

    const isSingle = q.opts.length <= 2;
    card.innerHTML = `
      <div class="question-card">
        <div class="question-category">${q.cat}</div>
        <div class="question-text">${q.q}</div>
        <div class="options-grid ${isSingle ? 'single-col' : ''}">
          ${q.opts.map((opt, i) => `
            <button class="option-btn" onclick="selectOption(${i})">
              <div class="opt-body">
                <span class="opt-letter">${letters[i]}</span>
                <span>${opt.text}</span>
              </div>
            </button>
          `).join('')}
        </div>
      </div>`;

    // Update progress
    const pct = Math.max(2, Math.round((currentQ / QUESTIONS.length) * 100));
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressFraction').textContent = `${currentQ + 1} / ${QUESTIONS.length}`;

    card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    card.style.opacity = '1';
    card.style.transform = 'none';
  }, 200);
}

  flashScreen();

  const q = QUESTIONS[currentQ];
  const opt = q.opts[optIdx];

  // apply scores
  Object.entries(opt.scores).forEach(([char, pts]) => {
    scores[char] = (scores[char] || 0) + pts;
  });

  // visual feedback
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === optIdx) {
      b.classList.add('selected');
      createRipple(b);
    }
  });

  setTimeout(() => {
    currentQ++;
    if (currentQ >= QUESTIONS.length) {
      showTransition();
    } else {
      renderQuestion();
    }
  }, 500);
}

function createRipple(btn) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = Math.max(btn.clientWidth, btn.clientHeight) + 'px';
  ripple.style.left = '50%';
  ripple.style.top = '50%';
  ripple.style.marginLeft = ripple.style.marginTop = -(Math.max(btn.clientWidth, btn.clientHeight) / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);
}

function flashScreen() {
  const f = document.getElementById('clickFlash');
  f.classList.add('flash');
  setTimeout(() => f.classList.remove('flash'), 100);
}

// ─────────────────────────────────────────
//  TRANSITION + RESULT
// ─────────────────────────────────────────
function showTransition() {
  showScreen('transition-screen');
  setTimeout(() => showResult(), 2800);
}

function showResult() {
  // Find winner
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const char = CHARACTERS[winner];

  playReveal();

  // Build result HTML
  const resultInner = document.getElementById('resultInner');
  resultInner.innerHTML = `
    <div class="result-label">✦ Soul Resonance Complete ✦</div>
    <div class="result-subtitle">Your Cursed Energy Aligns With</div>

    <div class="result-avatar">
      <div class="avatar-inner" style="background: radial-gradient(circle, rgba(0,0,0,0.8), rgba(0,0,0,0.95));">
        <span style="font-size:72px">${char.emoji}</span>
      </div>
    </div>

    <h2 class="result-character-name" style="
      background: linear-gradient(135deg, #fff 30%, ${char.color});
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    ">${char.name}</h2>
    <div class="result-title" style="color:${char.color}">${char.title}</div>

    <div class="result-desc-card" style="--card-accent: ${char.color}; color: ${char.color};">
      <p class="result-desc" style="color: var(--text-primary)">${char.desc}</p>
      <div class="result-traits">
        ${char.traits.map(t => `<span class="trait-tag" style="color:${char.color};border-color:${char.color}33">${t}</span>`).join('')}
      </div>
    </div>

    <div class="love-message">
      <div class="love-message-name">— A message for ${playerName} —</div>
      <div class="love-message-text">${char.message}</div>
    </div>

    <p class="final-line">
      No matter which character you got…<br>
      <strong style="color:var(--neon-pink)">you'll always be my favorite 💌</strong>
    </p>

    <div style="margin-bottom:16px;">
      <button class="secret-btn" onclick="openSecret('${winner}')">✨ Unlock Secret Message</button>
    </div>
    <div>
      <button class="retry-btn" onclick="restart()">↩ Retake Quiz</button>
    </div>
  `;

  // Apply character gradient to background
  document.getElementById('result').style.background = char.gradient + ', var(--dark-bg)';

  // Avatar glow
  const avatar = resultInner.querySelector('.result-avatar .avatar-inner');
  avatar.style.boxShadow = char.glow;

  showScreen('result');

  // Animate in
  setTimeout(() => {
    resultInner.style.animation = 'resultReveal 1s cubic-bezier(0.4,0,0.2,1) forwards';
  }, 100);

  // Easter egg: Konami-ish — type the char name
  console.log(`%c✨ Easter Egg: You got ${char.name}! Score: ${scores[winner]}`, `color: ${char.color}; font-size: 16px; font-weight: bold;`);
}

function openSecret(winner) {
  playClick();
  const char = CHARACTERS[winner];
  document.getElementById('secretText').innerHTML = char.secret;
  document.getElementById('secret-overlay').classList.add('show');
}

function closeSecret() {
  document.getElementById('secret-overlay').classList.remove('show');
}

function restart() {
  playClick();
  Object.keys(scores).forEach(k => scores[k] = 0);
  currentQ = 0;
  document.getElementById('result').style.background = '';
  showScreen('landing');
}

// ─────────────────────────────────────────
//  EASTER EGG — KONAMI CODE
// ─────────────────────────────────────────
const konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiIdx = 0;
document.addEventListener('keydown', e => {
  if (e.key === konamiCode[konamiIdx]) {
    konamiIdx++;
    if (konamiIdx === konamiCode.length) {
      konamiIdx = 0;
      // Secret Gojo mode
      alert('🌀 UNLIMITED VOID UNLOCKED 🌀\n\nGojo whispers: "You found me. Not bad, Sorcerer."');
    }
  } else {
    konamiIdx = 0;
  }
});

// Global click sound on interactive elements
document.addEventListener('click', e => {
  if (e.target.closest('button') || e.target.closest('.option-btn')) {
    // already handled
  }
}, true);

// Hide cursor on touch
document.addEventListener('touchstart', () => {
  dot.style.display = 'none';
  ring.style.display = 'none';
});
</script>
</body>
</html>
